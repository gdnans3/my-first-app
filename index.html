<link rel="manifest" href="manifest.json">
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App</title>

  <style>
    body {
      margin: 0;
      background: #1e1e2f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #2c2c3c;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    #display {
      width: 100%;
      height: 50px;
      font-size: 22px;
      margin-bottom: 10px;
      text-align: right;
      padding: 10px;
      border: none;
      border-radius: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }

    button {
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .num { background: #3b3b5c; color: white; }
    .op { background: orange; color: white; }
    .eq { background: green; color: white; }
    .clr { background: red; color: white; }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="num" onclick="press('7')">7</button>
    <button class="num" onclick="press('8')">8</button>
    <button class="num" onclick="press('9')">9</button>
    <button class="op" onclick="press('/')">÷</button>

    <button class="num" onclick="press('4')">4</button>
    <button class="num" onclick="press('5')">5</button>
    <button class="num" onclick="press('6')">6</button>
    <button class="op" onclick="press('*')">×</button>

    <button class="num" onclick="press('1')">1</button>
    <button class="num" onclick="press('2')">2</button>
    <button class="num" onclick="press('3')">3</button>
    <button class="op" onclick="press('-')">−</button>

    <button class="num" onclick="press('0')">0</button>
    <button class="num" onclick="press('.')">.</button>
    <button class="eq" onclick="calculate()">=</button>
    <button class="op" onclick="press('+')">+</button>

    <button class="clr" onclick="clearDisplay()" style="grid-column: span 4;">Clear</button>
  </div>
</div>

<script>
  function press(val) {
    document.getElementById("display").value += val;
  }

  function calculate() {
    try {
      document.getElementById("display").value =
        eval(document.getElementById("display").value);
    } catch {
      alert("Invalid Input");
    }
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }
</script>

</body>
</html>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
